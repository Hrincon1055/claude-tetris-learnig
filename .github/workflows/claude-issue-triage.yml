name: Claude Issue Formatter

on:
  issues:
    types: [opened, edited]

jobs:
  format-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Format issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools Bash(gh issue *),Bash(gh label *)'
          prompt: |
            You are a GitHub issue formatter for a Tetris game project (vanilla JS/HTML/CSS, no dependencies).

            An issue was just ${{ github.event.action }} with the following details:
            - Issue number: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - Body: ${{ github.event.issue.body }}
            - Author: ${{ github.event.issue.user.login }}

            Your tasks:
            1. **Add labels** based on the issue content. Use only these labels:
               - `bug` — something is broken or behaving incorrectly
               - `enhancement` — new feature or improvement request
               - `question` — asking for help or clarification
               - `documentation` — docs need updating
               - `good first issue` — simple, beginner-friendly task
               - `duplicate` — if it seems like a known/repeated problem

               Applying labels correctly:
               - A label can only be applied if it already exists in the repository. Run `gh label list --repo ${{ github.repository }}` first to see which labels exist.
               - If a label you want to apply does not exist yet, create it before applying it, e.g. `gh label create "enhancement" --repo ${{ github.repository }}` (add `--color` and `--description` if you like). Otherwise `gh issue edit --add-label` will fail.
               - Apply every relevant label in a single `gh issue edit ... --add-label "a" --add-label "b"` call and confirm the command succeeds.

            2. **Post a comment** on the issue that includes:
               - A brief, friendly summary of what the issue is about (1-2 sentences)
               - A "Formatted Report" section with:
                 - **Type**: Bug / Feature Request / Question / Other
                 - **Summary**: one clear sentence describing the problem or request
                 - **Steps to reproduce** (for bugs): list them if not provided, ask the user to provide them if it's a bug
                 - **Expected behavior** (for bugs): what should happen
                 - **Suggested labels**: the labels you applied and why
               - A closing note thanking the contributor

            **Comment formatting**: The comment body MUST be written in GitHub Flavored Markdown (GFM) so it renders nicely on GitHub. Use Markdown features such as:
               - `##`/`###` headings for sections (e.g. the "Formatted Report" section)
               - `**bold**` for field names and `-`/`1.` lists for steps and labels
               - fenced code blocks (```) for any code, commands, or console/error output
               - `` `inline code` `` for identifiers, labels, file names and values
               - tables, blockquotes (`>`) or task lists (`- [ ]`) where they improve clarity
            Do not paste raw unformatted text; always structure the comment with Markdown.

            Use the `gh` CLI to apply labels and post the comment. Example commands:
              gh label list --repo ${{ github.repository }}
              gh label create "enhancement" --repo ${{ github.repository }}
              gh issue edit ${{ github.event.issue.number }} --add-label "bug" --repo ${{ github.repository }}
              gh issue comment ${{ github.event.issue.number }} --body "..." --repo ${{ github.repository }}

            Be concise, helpful, and friendly. Do not over-engineer the response.
